<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Map Pro</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }

        /* Панель поиска */
        .search-panel {
            position: absolute;
            top: 15px;
            left: 60px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            gap: 8px;
        }
        
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 220px; outline: none; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        
        .geo-btn { background: #28a745; } /* Кнопка геолокации */

        /* Стили для маршрутной панели (делаем её компактнее) */
        .leaflet-routing-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            max-height: 300px !important;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="search-panel">
        <input type="text" id="address" placeholder="Найти место...">
        <button onclick="searchPlace()">Найти</button>
        <button class="geo-btn" onclick="locateMe()">📍 Где я?</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

    <script>
        // Инициализация
        const map = L.map('map').setView([55.7558, 37.6173], 13);
        let userLocation = null;
        let routeControl = null;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- 1. ФУНКЦИЯ ГЕОЛОКАЦИИ ---
        function locateMe() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', function(e) {
            userLocation = e.latlng;
            L.marker(e.latlng).addTo(map)
                .bindPopup("Вы здесь!").openPopup();
            
            // Добавляем синий круг точности
            L.circle(e.latlng, e.accuracy).addTo(map);
        });

        map.on('locationerror', function() {
            alert("Не удалось получить доступ к геопозиции.");
        });


        // --- 2. ФУНКЦИЯ МАРШРУТОВ ---
        function createRoute(destLatLng) {
            if (!userLocation) {
                alert("Сначала нажмите 'Где я?', чтобы мы знали точку старта.");
                return;
            }

            // Удаляем старый маршрут, если он есть
            if (routeControl) {
                map.removeControl(routeControl);
            }

            routeControl = L.Routing.control({
                waypoints: [
                    L.latLng(userLocation.lat, userLocation.lng), // Старт
                    L.latLng(destLatLng.lat, destLatLng.lng) // Финиш
                ],
                routeWhileDragging: true,
                language: 'ru',
                createMarker: function() { return null; } // Не плодить лишние маркеры
            }).addTo(map);
        }


        // --- 3. ИНТЕРАКТИВНОСТЬ И КЛИКИ ---
        // Клик по карте — ставим временный маркер и предлагаем маршрут
        map.on('click', function(e) {
            const popupContent = `
                <div>
                    <b>Координаты:</b> ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}<br>
                    <button onclick="createRoute({lat: ${e.latlng.lat}, lng: ${e.latlng.lng}})" 
                            style="margin-top:10px; cursor:pointer;">
                        Сюда маршрут
                    </button>
                </div>
            `;
            
            L.popup()
                .setLatLng(e.latlng)
                .setContent(popupContent)
                .openOn(map);
        });


        // --- 4. ПОИСК (с автоматическим маркером) ---
        async function searchPlace() {
            const query = document.getElementById('address').value;
            if (!query) return;

            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await response.json();

            if (data.length > 0) {
                const { lat, lon, display_name } = data[0];
                const target = L.latLng(lat, lon);
                
                map.setView(target, 16);
                
                L.marker(target).addTo(map)
                    .bindPopup(`
                        <b>${display_name}</b><br>
                        <button onclick="createRoute({lat: ${lat}, lng: ${lon}})">Поехали!</button>
                    `)
                    .openPopup();
            } else {
                alert("Ничего не нашли :(");
            }
        }
    </script>
</body>
</html>
